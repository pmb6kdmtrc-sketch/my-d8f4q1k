<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="予備試験RPG">
<meta name="theme-color" content="#080a0f">
<title>予備試験RPG</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080a0f;color:#e8eaf6;font-family:system-ui,sans-serif;min-height:100vh}
#app{padding:20px}
button{cursor:pointer;border:none;font-family:inherit;border-radius:12px;padding:12px 20px;font-weight:700;font-size:14px}
input,textarea,select{background:#1a1d2a;border:1px solid #2a2d3a;color:#e8eaf6;border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;box-sizing:border-box}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes popIn{0%{transform:scale(0.3);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 2px transparent)}50%{filter:drop-shadow(0 0 12px gold)}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px"><div style="font-size:60px">⚖️</div><div style="color:#f59e0b;font-weight:700">起動中...</div></div></div>
<script src="game.js"></script>
</body>
</html>
